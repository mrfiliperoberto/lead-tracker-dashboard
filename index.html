<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- === CABEÇALHO === -->
    <header>
        <div class="header-content">
        <h1>Lead Tracker Dashboard</h1>
        <p>Manage and track your sales leads in one place.</p>
        </div>
    </header>
<!-- === ÁREA PRINCIPAL === -->
<main>
    <!-- === MÉTRICAS: 3 números em destaque === -->
    <section class="metrics">
        <div class="metric-card">
            <span class="metric-number" id="total-count">0</span>
            <span class="metric-label">Total Leads</span>
        </div>
        <div class="metric-card">
            <span class="metric-number" id="contacted-count">0</span>
            <span class="metric-label">Contacted</span>
        </div>
        <div class="metric-card">
            <span class="metric-number" id="converted-count">0</span>
            <span class="metric-label">Converted</span>
            </div>
    </section>
<!-- Controls: fiters + search + export -->
    <section class="controls">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="new">New</button>
            <button class="filter-btn" data-filter="contacted">Contacted</button>
            <button class="filter-btn" data-filter="converted">Converted</button>
        </div>
        <div class="search-export">
            <input type="text" id="search-input"
                placeholder="Search by name or company...">
            <button id="export-btn">Export CSV</button>
        </div>
    </section>

    <!-- New Lead Form -->
    <section class="new-lead-form">
        <h2>Add New Lead</h2>
        <div class="form-fields">
            <input type="text" id="new-lead-name" placeholder="Name" required>
            <input type="text" id="new-lead-company" placeholder="Company" required>
            <input type="email" id="new-lead-email" placeholder="Email" required>
            <select id="new-lead-status">
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="converted">Converted</option>
            </select>
            <button id="add-lead-btn">Add Lead</button>
        </div>
    </section>

    <!-- Leads table -->
     <section class="leads-grid" id="leads-grid">
        <!-- Cards generated by JavaScript will go here -->
        </section>

 </main>

 
 <script src="app.js"></script>
        

    
</body>
</html>
